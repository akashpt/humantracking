{% extends 'webapp/layouts/base.html' %}
{% block content %}
  {% load static %}
  <section class="login_page_div">
    <div class="container d-flex justify-content-center align-items-center vh-80">
      <div class="row">
        <div class="col-md-12">
          <div class="login-box">
            <div class="login_form">
              <h2>Rules Login</h2>
              <p>Please log in to access the rules page and manage system settings safely and easily.</p>
            </div>
            <form method="POST">
              {% csrf_token %}

              <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required />
              </div>

              <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required />
              </div>

              <button class="login-btn" type="submit">Login</button>
            </form>
            {% if error %}
              <div class="error">{{ error }}</div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
