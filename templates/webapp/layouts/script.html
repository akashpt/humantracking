<!-- Apex Chart -->
<script src="{% static 'webapp/assets/js/plugins/apexcharts.min.js' %}"></script>
<script>
  var options = {
    series: [
      {
        name: 'Inflation',
        data: [2.3, 3.1, 4.0, 10.1, 4.0, 3.6, 3.2, 2.3, 1.4, 0.8, 0.5, 0.2]
      }
    ],
    chart: {
      height: 350,
      type: 'bar'
    },
    plotOptions: {
      bar: {
        borderRadius: 10,
        dataLabels: {
          position: 'top' // top, center, bottom
        }
      }
    },
    dataLabels: {
      enabled: true,
      formatter: function (val) {
        return val + '%'
      },
      offsetY: -20,
      style: {
        fontSize: '12px',
        colors: ['#304758']
      }
    },
  
    xaxis: {
      categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
      position: 'top',
      axisBorder: {
        show: false
      },
      axisTicks: {
        show: false
      },
      crosshairs: {
        fill: {
          type: 'gradient',
          gradient: {
            colorFrom: '#D8E3F0',
            colorTo: '#BED1E6',
            stops: [0, 100],
            opacityFrom: 0.4,
            opacityTo: 0.5
          }
        }
      },
      tooltip: {
        enabled: true
      }
    },
    yaxis: {
      axisBorder: {
        show: false
      },
      axisTicks: {
        show: false
      },
      labels: {
        show: false,
        formatter: function (val) {
          return val + '%'
        }
      }
    },
    title: {
      text: 'Monthly Inflation in Argentina, 2002',
      floating: true,
      offsetY: 330,
      align: 'center',
      style: {
        color: '#444'
      }
    }
  }
  
  var chart = new ApexCharts(document.querySelector('#traffic-chart'), options)
  chart.render()
  
  // pie chart
  var options = {
    series: [44, 55, 13, 43, 22],
    chart: {
      width: 380,
      type: 'pie'
    },
    labels: ['Team A', 'Team B', 'Team C', 'Team D', 'Team E'],
    responsive: [
      {
        breakpoint: 480,
        options: {
          chart: {
            width: 300
          },
          legend: {
            position: 'bottom'
          }
        }
      }
    ]
  }
  
  document.addEventListener('DOMContentLoaded', function () {
    var chart = new ApexCharts(document.querySelector('#Sales-chart'), options)
    chart.render()
  })
</script>
<script>
  $(document).on('submit', '#employeeForm', function (e) {
    e.preventDefault()
  
    if (!this.checkValidity()) {
      this.classList.add('was-validated')
      return
    }
  
    let formData = new FormData(this)
  
    function getCookie(name) {
      let cookieValue = null
      if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(function (cookie) {
          cookie = cookie.trim()
          if (cookie.startsWith(name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1))
          }
        })
      }
      return cookieValue
    }
  
    $.ajax({
      url: '/face-register/',
      type: 'POST',
      data: formData,
      processData: false,
      contentType: false,
      headers: { 'X-CSRFToken': getCookie('csrftoken') },
  
      success: function (res) {
        if (res.success) {
          window.location.href = '/face-record/' + res.employee_db_id + '/'
        }
      },
  
      error: function (xhr) {
        alert(xhr.responseJSON?.error || 'Server error')
      }
    })
  })
</script>
