{% extends 'webapp/layouts/base.html' %}
{% load static %}
{% block content %}
  <div class="container employee_edit_page">
    <div class="row">
      <div class="col-md-12">
        <div class="card shadow edit-card p-4">
          <div class="edit_heading">
            <h4 class="">Edit Employee</h4>
          </div>
          <div class="text-center mb-4">
            {% if employee.profile_pic %}
              <img src="{{ employee.profile_pic.url }}" class="profile-preview" />
            {% else %}
              <img src="{% static 'img/default-user.png' %}" class="profile-preview" />
            {% endif %}
          </div>

          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Employee Name</label>
                  <input class="form-control" name="emp_name" value="{{ employee.emp_name }}" required />
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Department</label>
                  <input class="form-control" name="dept" value="{{ employee.dept }}" />
                </div>
              </div>
              <div class="col-md-12">
                <div class="mb-3">
                  <label class="form-label">Employee Type</label>
                  <input class="form-control" name="emp_type" value="{{ employee.emp_type }}" />
                </div>
              </div>
              <div class="col-md-12">
                {% comment %} <div class="mb-3">
                  <label class="form-label">Change Profile Image</label>
                  <input type="file" class="form-control" name="profile_pic" accept="image/*" />
                </div> {% endcomment %}
                <div class="file_upload">
                  <div class="profile-upload">
                    <label class="upload-label">Profile Picture</label>
                    <div class="upload-container">
                      <!-- Avatar Preview -->
                      <div class="avatar-wrapper">
                        <img id="preview" class="avatar-img" src="{{ employee.profile_pic.url }}" alt="{{ employee.emp_name }}" />
                        <div class="avatar-overlay">
                          <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                          </svg>
                        </div>
                      </div>

                      <!-- Upload Area -->
                      <label class="upload-zone-label">
                        <div class="upload-zone">
                          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                          </svg>
                          <span class="upload-main-text">Click to upload or drag & drop</span>
                          <span class="upload-sub-text">PNG, JPG, WEBP • Max 5 MB • Square recommended (400×400+)</span>
                        </div>
                        <input type="file" name="profile_pic" accept="image/*" id="profileInput" class="file-input" />
                      </label>
                    </div>
                    <p class="upload-hint">For best results, use a square image at least 400×400 pixels.</p>
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <button class="btn btn-update px-4">Update</button>
              <a href="{% url 'employee_list' %}" class="btn btn-cancel px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const profileInput = document.getElementById('profileInput')
    const preview = document.getElementById('preview')
    
    profileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0]
      if (!file) return
    
      if (!file.type.startsWith('image/')) {
        alert('Please select an image file')
        return
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('File size should be less than 5MB')
        return
      }
    
      const reader = new FileReader()
      reader.onload = (ev) => {
        preview.src = ev.target.result
        preview.classList.add('preview-flash')
        setTimeout(() => preview.classList.remove('preview-flash'), 1800)
      }
      reader.readAsDataURL(file)
    })
  </script>
{% endblock %}
